apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: clean
      image: alpine:latest
      script: |
        echo "Cleaning up workspace..."
        rm -rf $(workspaces.source.path)/*

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  workspaces:
    - name: source
  steps:
    - name: run-nose
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install flake8 nose redis
        nosetests
